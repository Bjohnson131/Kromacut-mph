name: Release Native App

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        strategy:
            matrix:
                include:
                    - name: 'macOS Apple Silicon'
                      platform: 'macos-latest'
                      args: '--target aarch64-apple-darwin'
                      assetNamePattern: ''
                      includeUpdaterJson: 'true'
                    - name: 'macOS Intel'
                      platform: 'macos-latest'
                      args: '--target x86_64-apple-darwin'
                      assetNamePattern: ''
                      includeUpdaterJson: 'true'
                    - name: 'Linux'
                      platform: 'ubuntu-22.04'
                      args: ''
                      assetNamePattern: ''
                      includeUpdaterJson: 'true'
                    - name: 'Windows online installer'
                      platform: 'windows-latest'
                      args: '--bundles nsis'
                      assetNamePattern: ''
                      includeUpdaterJson: 'true'
                    - name: 'Windows offline installer'
                      platform: 'windows-latest'
                      args: '--bundles nsis --config src-tauri/tauri.offline.conf.json'
                      assetNamePattern: '[name]_[version]_[platform]_[arch]_offline[setup][ext]'
                      includeUpdaterJson: 'false'

        runs-on: ${{ matrix.platform }}
        name: Build ${{ matrix.name }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-darwin,x86_64-apple-darwin

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install dependencies
              run: npm ci

            - name: Build
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Kromacut ${{ github.ref_name }}'
                  releaseBody: ''
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}
                  assetNamePattern: ${{ matrix.assetNamePattern }}
                  includeUpdaterJson: ${{ matrix.includeUpdaterJson }}

    release:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Publish release
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('node:fs');

                      const installationNotes = `## Installation

                      **macOS:**
                      1. Download the .dmg file for your Mac:
                         - Apple Silicon (M1/M2/M3): *_aarch64.dmg
                         - Intel: *_x86_64.dmg
                      2. Open the DMG and drag Kromacut to Applications
                      3. Remove quarantine (required for unsigned apps):
                         sudo xattr -d com.apple.quarantine /Applications/Kromacut.app
                      4. Launch from Applications

                      **Windows:**
                      1. Download the -setup.exe installer.
                      2. Run the installer and follow the prompts. The standard Windows installer includes the Microsoft Edge WebView2 bootstrapper, but requires internet access if WebView2 needs to be installed or updated.
                      3. For offline Windows machines, download the *_offline-setup.exe installer instead.
                      4. Launch Kromacut from the Start menu

                      **Linux:**
                      1. Download the .AppImage or .deb file
                      2. For AppImage: chmod +x Kromacut*.AppImage && ./Kromacut*.AppImage
                      3. For Debian/Ubuntu: sudo dpkg -i kromacut*.deb`;

                      function getChangelogEntry(changelog, tagName) {
                          const heading = /^##\s+(.+?)\s*$/gm;
                          let match;

                          while ((match = heading.exec(changelog)) !== null) {
                              const version = match[1].split(' - ')[0].trim();

                              if (version !== tagName) {
                                  continue;
                              }

                              const start = heading.lastIndex;
                              const next = heading.exec(changelog);
                              const end = next ? next.index : changelog.length;

                              return changelog.slice(start, end).trim();
                          }

                          return '';
                      }

                      const tagName = process.env.GITHUB_REF_NAME || context.ref.replace('refs/tags/', '');
                      const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
                      const changelogEntry = getChangelogEntry(changelog, tagName);
                      const changelogNotes = changelogEntry
                          ? `## What's Changed\n\n${changelogEntry}`
                          : `## What's Changed\n\nNo matching changelog entry was found for \`${tagName}\`.`;
                      const releaseBody = `${installationNotes}\n\n${changelogNotes}`;

                      const releases = await github.paginate(github.rest.repos.listReleases, {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          per_page: 100
                      });
                      const draftRelease = releases.find(r => r.draft && r.tag_name === tagName);
                      if (draftRelease) {
                          await github.rest.repos.updateRelease({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              release_id: draftRelease.id,
                              draft: false,
                              body: releaseBody
                          });
                      } else {
                          core.warning(`No draft release found for ${tagName}.`);
                      }
